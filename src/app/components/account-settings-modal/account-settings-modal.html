@if (isOpen && user) {
  <div class="fixed inset-0 z-[100] flex items-center justify-center overflow-y-auto overflow-x-hidden bg-zinc-900/50 backdrop-blur-sm transition-opacity">
    <div class="relative w-full max-w-md p-4 h-full md:h-auto">

      <!-- Modal content -->
      <div class="relative bg-white dark:bg-zinc-800 rounded-2xl shadow-xl border border-zinc-100 dark:border-zinc-700 overflow-hidden">

        <!-- Header -->
        <div class="flex items-center justify-between p-4 sm:p-5 border-b border-zinc-100 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800/50">
          <h3 class="text-xl font-semibold text-zinc-900 dark:text-white flex items-center">
            <mat-icon class="mr-2 text-orange-500">settings</mat-icon>
            Ustawienia konta
          </h3>
          <button
            type="button"
            class="text-zinc-400 bg-transparent hover:bg-zinc-200 hover:text-zinc-900 rounded-lg text-sm p-1.5 ml-auto inline-flex items-center dark:hover:bg-zinc-700 dark:hover:text-white transition-colors"
            (click)="close()"
          >
            <mat-icon>close</mat-icon>
            <span class="sr-only">Zamknij modal</span>
          </button>
        </div>

        <!-- Body -->
        <div class="p-6">
          <form (ngSubmit)="onSubmit()" class="space-y-6">

            <!-- Email Change Section -->
            <div class="space-y-4">
              <h4 class="text-sm font-semibold text-zinc-900 dark:text-white border-b border-zinc-100 dark:border-zinc-700 pb-2">Zmiana adresu e-mail</h4>

              <div>
                <label for="currentEmail" class="block mb-1.5 text-sm font-medium text-zinc-900 dark:text-white">Aktualny e-mail</label>
                <input
                  id="currentEmail"
                  type="email"
                  name="currentEmail"
                  [(ngModel)]="formData.currentEmail"
                  class="bg-zinc-50 border border-zinc-300 text-zinc-900 text-sm rounded-xl focus:ring-orange-500 focus:border-orange-500 block w-full p-2.5 dark:bg-zinc-700 dark:border-zinc-600 dark:placeholder-zinc-400 dark:text-white dark:focus:ring-orange-500 dark:focus:border-orange-500"
                >
              </div>

              <div>
                <label for="newEmail" class="block mb-1.5 text-sm font-medium text-zinc-900 dark:text-white">Nowy e-mail</label>
                <input
                  id="newEmail"
                  type="email"
                  name="newEmail"
                  [(ngModel)]="formData.newEmail"
                  class="bg-zinc-50 border border-zinc-300 text-zinc-900 text-sm rounded-xl focus:ring-orange-500 focus:border-orange-500 block w-full p-2.5 dark:bg-zinc-700 dark:border-zinc-600 dark:placeholder-zinc-400 dark:text-white dark:focus:ring-orange-500 dark:focus:border-orange-500"
                >
              </div>
            </div>

            <!-- Password Change Section -->
            <div class="space-y-4 pt-4">
              <h4 class="text-sm font-semibold text-zinc-900 dark:text-white border-b border-zinc-100 dark:border-zinc-700 pb-2">Zmiana hasła</h4>

              <div>
                <label for="currentPassword" class="block mb-1.5 text-sm font-medium text-zinc-900 dark:text-white">Aktualne hasło</label>
                <input
                  id="currentPassword"
                  type="password"
                  name="currentPassword"
                  [(ngModel)]="formData.currentPassword"
                  class="bg-zinc-50 border border-zinc-300 text-zinc-900 text-sm rounded-xl focus:ring-orange-500 focus:border-orange-500 block w-full p-2.5 dark:bg-zinc-700 dark:border-zinc-600 dark:placeholder-zinc-400 dark:text-white dark:focus:ring-orange-500 dark:focus:border-orange-500"
                >
              </div>

              <div>
                <label for="newPassword" class="block mb-1.5 text-sm font-medium text-zinc-900 dark:text-white">Nowe hasło</label>
                <input
                  id="newPassword"
                  type="password"
                  name="newPassword"
                  [(ngModel)]="formData.newPassword"
                  class="bg-zinc-50 border border-zinc-300 text-zinc-900 text-sm rounded-xl focus:ring-orange-500 focus:border-orange-500 block w-full p-2.5 dark:bg-zinc-700 dark:border-zinc-600 dark:placeholder-zinc-400 dark:text-white dark:focus:ring-orange-500 dark:focus:border-orange-500"
                >
              </div>
            </div>

            @if (errorMessage) {
              <div class="text-sm text-red-500 dark:text-red-400 mt-2">
                {{ errorMessage }}
              </div>
            }

            @if (successMessage) {
              <div class="text-sm text-green-500 dark:text-green-400 mt-2">
                {{ successMessage }}
              </div>
            }

            <div class="flex items-center justify-end space-x-3 pt-4 border-t border-zinc-100 dark:border-zinc-700 mt-6">
              <button type="button" (click)="close()" class="text-zinc-700 bg-white border border-zinc-300 focus:ring-4 focus:outline-none focus:ring-zinc-100 font-medium rounded-xl text-sm px-5 py-2.5 hover:bg-zinc-50 dark:bg-zinc-800 dark:text-zinc-300 dark:border-zinc-600 dark:hover:bg-zinc-700 dark:hover:border-zinc-500 dark:focus:ring-zinc-700 transition-colors">
                Anuluj
              </button>
              <button type="submit" [disabled]="!isFormValid()" class="text-white bg-orange-500 hover:bg-orange-600 focus:ring-4 focus:outline-none focus:ring-orange-300 font-medium rounded-xl text-sm px-5 py-2.5 text-center dark:bg-orange-600 dark:hover:bg-orange-700 dark:focus:ring-orange-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                Zapisz zmiany
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
}

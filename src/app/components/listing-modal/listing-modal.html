@if (isOpen) {
  <div class="fixed inset-0 z-[100] flex items-center justify-center overflow-y-auto overflow-x-hidden bg-zinc-900/50 backdrop-blur-sm transition-opacity">
    <div class="relative w-full max-w-2xl p-4 h-full md:h-auto">

      <!-- Modal content -->
      <div class="relative bg-white dark:bg-zinc-800 rounded-2xl shadow-xl border border-zinc-100 dark:border-zinc-700 overflow-hidden">

        <!-- Header -->
        <div class="flex items-center justify-between p-4 sm:p-5 border-b border-zinc-100 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800/50">
          <h3 class="text-xl font-semibold text-zinc-900 dark:text-white">
            {{ isEditing ? 'Edytuj ogłoszenie' : 'Dodaj nowe ogłoszenie' }}
          </h3>
          <button
            type="button"
            class="text-zinc-400 bg-transparent hover:bg-zinc-200 hover:text-zinc-900 rounded-lg text-sm p-1.5 ml-auto inline-flex items-center dark:hover:bg-zinc-700 dark:hover:text-white transition-colors"
            (click)="close()"
          >
            <mat-icon>close</mat-icon>
            <span class="sr-only">Zamknij modal</span>
          </button>
        </div>

        <!-- Body -->
        <div class="p-6">
          <form (ngSubmit)="onSubmit()" class="space-y-4">
            <div>
              <div class="block mb-1.5 text-sm font-medium text-zinc-900 dark:text-white" id="type-label">Typ ogłoszenia</div>
              <div class="flex gap-4" aria-labelledby="type-label">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="type" value="ITEM" [(ngModel)]="formData.type" class="text-orange-500 focus:ring-orange-500">
                  <span class="text-sm text-zinc-900 dark:text-white">Przedmiot</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="type" value="SERVICE" [(ngModel)]="formData.type" class="text-orange-500 focus:ring-orange-500">
                  <span class="text-sm text-zinc-900 dark:text-white">Usługa</span>
                </label>
              </div>
            </div>

            <div>
              <label for="title" class="block mb-1.5 text-sm font-medium text-zinc-900 dark:text-white">Tytuł ogłoszenia</label>
              <input id="title" type="text" name="title" [(ngModel)]="formData.title" required class="bg-zinc-50 border border-zinc-300 text-zinc-900 text-sm rounded-xl focus:ring-orange-500 focus:border-orange-500 block w-full p-2.5 dark:bg-zinc-700 dark:border-zinc-600 dark:placeholder-zinc-400 dark:text-white dark:focus:ring-orange-500 dark:focus:border-orange-500">
            </div>

            <div>
              <div class="block mb-1.5 text-sm font-medium text-zinc-900 dark:text-white" id="price-label">Cena (PLN)</div>
              <div class="flex flex-wrap items-center gap-2" aria-labelledby="price-label">
                <div class="relative flex-1 min-w-[120px]">
                  <input type="number" min="0" step="0.01" [(ngModel)]="formData.price" name="price" required placeholder="Kwota" class="bg-zinc-50 border border-zinc-300 text-zinc-900 text-sm rounded-xl focus:ring-orange-500 focus:border-orange-500 block w-full p-2.5 dark:bg-zinc-700 dark:border-zinc-600 dark:placeholder-zinc-400 dark:text-white dark:focus:ring-orange-500 dark:focus:border-orange-500">
                </div>
              </div>
              @if (priceError) {
                <p class="mt-1 text-sm text-red-500">{{ priceError }}</p>
              }
            </div>

            <div>
              <label for="imageUrl" class="block mb-1.5 text-sm font-medium text-zinc-900 dark:text-white">Adres URL zdjęcia</label>
              <input id="imageUrl" type="url" name="imageUrl" [(ngModel)]="formData.imageUrl" required class="bg-zinc-50 border border-zinc-300 text-zinc-900 text-sm rounded-xl focus:ring-orange-500 focus:border-orange-500 block w-full p-2.5 dark:bg-zinc-700 dark:border-zinc-600 dark:placeholder-zinc-400 dark:text-white dark:focus:ring-orange-500 dark:focus:border-orange-500">
            </div>

            <div>
              <label for="tags" class="block mb-1.5 text-sm font-medium text-zinc-900 dark:text-white">Tagi (oddzielone przecinkiem)</label>
              <input id="tags" type="text" name="tags" [(ngModel)]="tagsString" required class="bg-zinc-50 border border-zinc-300 text-zinc-900 text-sm rounded-xl focus:ring-orange-500 focus:border-orange-500 block w-full p-2.5 dark:bg-zinc-700 dark:border-zinc-600 dark:placeholder-zinc-400 dark:text-white dark:focus:ring-orange-500 dark:focus:border-orange-500">
            </div>

            <div>
              <label for="description" class="block mb-1.5 text-sm font-medium text-zinc-900 dark:text-white">Opis</label>
              <textarea id="description" name="description" [(ngModel)]="formData.description" rows="4" required class="bg-zinc-50 border border-zinc-300 text-zinc-900 text-sm rounded-xl focus:ring-orange-500 focus:border-orange-500 block w-full p-2.5 dark:bg-zinc-700 dark:border-zinc-600 dark:placeholder-zinc-400 dark:text-white dark:focus:ring-orange-500 dark:focus:border-orange-500"></textarea>
            </div>

            <div class="flex items-center justify-end space-x-3 pt-4 border-t border-zinc-100 dark:border-zinc-700">
              <button type="button" (click)="close()" class="text-zinc-700 bg-white border border-zinc-300 focus:ring-4 focus:outline-none focus:ring-zinc-100 font-medium rounded-xl text-sm px-5 py-2.5 hover:bg-zinc-50 dark:bg-zinc-800 dark:text-zinc-300 dark:border-zinc-600 dark:hover:bg-zinc-700 dark:hover:border-zinc-500 dark:focus:ring-zinc-700 transition-colors">
                Anuluj
              </button>
              <button type="submit" [disabled]="!isFormValid()" class="text-white bg-orange-500 hover:bg-orange-600 focus:ring-4 focus:outline-none focus:ring-orange-300 font-medium rounded-xl text-sm px-5 py-2.5 text-center dark:bg-orange-600 dark:hover:bg-orange-700 dark:focus:ring-orange-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                {{ isEditing ? 'Zapisz zmiany' : 'Dodaj ogłoszenie' }}
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
}
